<!DOCTYPE html>
<html>
<head>
    <title>Sweet Dessert | Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f0faff; color: #333; margin: 0; display: flex; flex-direction: column; min-height: 100vh;}
        .navbar { background: white; padding: 15px 50px; display: flex; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.1); align-items: center;}
        .navbar h2 { color: #00a8ff; margin: 0; font-family: 'Fredoka One'; }
        .navbar a { color: #00a8ff; text-decoration: none; font-weight: bold; margin-left: 20px; }
        .content { flex: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 40px; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { width: 100%; border-radius: 15px; }
        .card h3 { font-family: 'Fredoka One'; color: #0056b3; }
        .btn { background: #00a8ff; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; display: block; font-weight: bold; margin-top: 10px;}
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Sweet Dessert</h2>
        <div>
            <a href="/">Home</a>
            <a href="/menu">Menu</a>
            {% if session['customer_name'] %}
                <a href="/mybookings">My Bookings</a>
                <a href="/logout" style="color: grey;">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </div>
    
    <div class="content">
        <h1 style="text-align:center; color:#00a8ff; font-family:'Fredoka One'; margin-top: 30px;">Our Menu</h1>
        <div class="grid">
            {% for item in menu %}
            <div class="card">
                <img src="{{ url_for('static', filename='images/' + item.img) }}" alt="{{ item.name }}" onerror="this.src='https://via.placeholder.com/250?text=Dessert'">
                <h3>{{ item.name }}</h3>
                <p style="font-size: 1.5rem; color: #00a8ff; font-weight: bold;">₹{{ item.price }}</p>
                <a href="/buy/{{ item.name }}/{{ item.price }}" class="btn">Order Now</a>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer style="text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid rgba(0,0,0,0.1);">
        <p style="color: #666; font-size: 0.9rem; margin: 0;">
            &copy; 2026 Sweet Dessert | 
            <a href="/admin_login" style="color: #00a8ff; text-decoration: none; font-weight: bold;">Admin Access</a>
        </p>
    </footer>
</body>
</html>
