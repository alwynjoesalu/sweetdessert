<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #f0faff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .order { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .pending { color: orange; font-weight: bold; }
        .confirmed { color: #00cc66; font-weight: bold; }
        .btn { background: #00a8ff; color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #00a8ff; font-family: 'Fredoka One';">My Orders</h1>
        {% if not orders %}
            <p>You haven't ordered anything yet!</p>
        {% endif %}
        
        {% for order in orders %}
        <div class="order">
            <div>
                <strong style="font-size: 1.2rem;">{{ order.product_name }}</strong><br>
                <span>₹{{ order.price }}</span>
            </div>
            <div>
                {% if order.status == 'Pending' %}
                    <span class="pending">⏳ Pending Admin Approval</span>
                {% else %}
                    <span class="confirmed">✅ Confirmed! Being Prepared</span>
                {% endif %}
            </div>
        </div>
        {% endfor %}
        <br>
        <a href="/menu" class="btn">Order More</a>
        <a href="/logout" style="color: grey; margin-left: 15px; text-decoration: none;">Logout</a>
    </div>
</body>
</html>
