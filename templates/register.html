<!DOCTYPE html>
<html>
<head>
    <title>Sign Up | Sweet Dessert</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #00a8ff; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 300px; }
        h2 { font-family: 'Fredoka One'; color: #00a8ff; margin-top: 0; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 10px; font-family: 'Nunito'; outline: none; }
        .btn { background: #00cc66; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-top: 10px;}
        .flash { color: #ff4757; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Create Account</h2>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="/register">
                <input type="text" name="name" placeholder="Your Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Create Password" required>
                <button type="submit" class="btn">Sign Up</button>
            </form>
            <br>
            <p style="font-size: 0.9rem; color: #666;">Already have an account? <a href="/login" style="color: #00a8ff; font-weight: bold;">Login</a></p>
        </div>
    </div>
</body>
</html>
