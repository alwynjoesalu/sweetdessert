<!DOCTYPE html>
<html>
<head>
    <title>Who is Ordering? | Sweet Dessert</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #00a8ff; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; width: 300px; }
        h2 { font-family: 'Fredoka One'; color: #00a8ff; margin-top: 0; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 2px solid #e0e0e0; border-radius: 10px; font-family: 'Nunito'; outline: none; }
        .btn { background: #00a8ff; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 20px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .flash { color: #ff4757; font-size: 0.9rem; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Sweet Dessert</h2>
            <p>Enter your name to start ordering!</p>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div class="flash">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="/login">
                <input type="text" name="customer_name" placeholder="Your Name (e.g., Alwyn)" required>
                <button type="submit" class="btn">Let's Go!</button>
            </form>
            <br>
            <a href="/" style="color: grey; text-decoration: none; font-size: 0.9rem;">&laquo; Back to Home</a>
        </div>
    </div>

    <footer style="text-align: center; padding: 20px; background: rgba(255,255,255,0.1);">
        <p style="color: white; font-size: 0.9rem; margin: 0;">
            &copy; 2026 Sweet Dessert | 
            <a href="/admin_login" style="color: white; text-decoration: underline; font-weight: bold;">Admin Access</a>
        </p>
    </footer>
</body>
</html>
