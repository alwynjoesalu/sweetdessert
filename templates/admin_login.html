<!DOCTYPE html>
<html>
<head>
    <title>Admin Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #333; display: flex; flex-direction: column; height: 100vh; margin: 0; color: white; }
        .container { flex: 1; display: flex; justify-content: center; align-items: center; }
        .login-box { background: #444; padding: 40px; border-radius: 10px; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; font-family: 'Nunito'; }
        .btn { background: #00cc66; color: white; border: none; padding: 12px 20px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2 style="color: #00cc66;">Admin Portal</h2>
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}
                  <div style="color: #ff4757; margin-bottom: 10px; font-weight: bold;">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST" action="/admin_login">
                <input type="text" name="username" placeholder="Admin Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit" class="btn">Secure Login</button>
            </form>
            <br>
            <a href="/" style="color: #aaa; text-decoration: none; font-size: 0.9rem;">&laquo; Back to Customer Site</a>
        </div>
    </div>
</body>
</html>
