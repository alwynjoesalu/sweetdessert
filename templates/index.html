<!DOCTYPE html>
<html>
<head>
    <title>Sweet Dessert | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #00a8ff; color: white; margin: 0; text-align: center; display: flex; flex-direction: column; min-height: 100vh;}
        .navbar { background: white; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center;}
        .navbar h2 { color: #00a8ff; margin: 0; font-family: 'Fredoka One'; }
        .navbar a { color: #00a8ff; text-decoration: none; font-weight: bold; margin-left: 20px; }
        .hero { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .hero h1 { font-family: 'Fredoka One'; font-size: 4rem; margin-bottom: 0; }
        .btn { background: white; color: #00a8ff; padding: 15px 40px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.2rem; margin-top: 20px; display: inline-block;}
    </style>
</head>
<body>
    <div class="navbar">
        <h2>Sweet Dessert</h2>
        <div>
            <a href="/">Home</a>
            <a href="/menu">Menu</a>
            {% if session['customer_name'] %}
                <a href="/mybookings">My Bookings</a>
                <a href="/logout" style="color: grey;">Logout</a>
            {% else %}
                <a href="/login">Login</a>
            {% endif %}
        </div>
    </div>
    
    <div class="hero">
        <h1>A Sweet Surprise <br> is On Track!</h1>
        <p style="font-size: 1.5rem;">Opening shortly at Bangalore</p>
        <a href="/menu" class="btn">View Menu</a>
    </div>

    <footer style="text-align: center; padding: 20px; background: rgba(255,255,255,0.1);">
        <p style="color: white; font-size: 0.9rem; margin: 0;">
            &copy; 2026 Sweet Dessert | 
            <a href="/admin_login" style="color: white; text-decoration: underline; font-weight: bold;">Admin Access</a>
        </p>
    </footer>
</body>
</html>
